<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">FORGE assembly animation</title>
  <desc id="desc">Six specialist modules assemble around a cyan orchestration core, followed by the FORGE wordmark and tagline.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070b16"/>
      <stop offset=".55" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#11182c"/>
    </linearGradient>
    <radialGradient id="core-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".38"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="core-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="module" d="M49 10H71L80 27L75 39L66 35H54L45 39L40 27L49 10Z"/>
    <path id="trace" d="M60 38V45"/>
    <mask id="negative-space" maskUnits="userSpaceOnUse" x="0" y="0" width="120" height="120">
      <rect width="120" height="120" fill="white"/>
      <path d="M52.5 29H58V30H53.5V46H57V47H53.5V66H52.5V29Z" fill="black"/>
    </mask>
    <style>
      .module {
        fill: #f7f9fc;
        stroke: #262d40;
        stroke-width: 1.4;
        stroke-linejoin: round;
        animation: module-assemble 1.7s cubic-bezier(.22,.72,.2,1) both;
        animation-delay: calc(var(--module-index) * 25ms);
        transform-box: fill-box;
        transform-origin: center;
      }
      .traces {
        fill: none;
        stroke: #22d3ee;
        stroke-width: 2;
        stroke-linecap: round;
        opacity: .62;
        stroke-dasharray: 10;
        animation: traces-connect 1.7s ease-out both;
      }
      .core {
        fill: #22d3ee;
        stroke: #179db5;
        stroke-width: 1.5;
        stroke-linejoin: round;
        opacity: .72;
        animation: core-ignite 1.7s ease-out both;
        transform-box: fill-box;
        transform-origin: center;
      }
      .core-inset {
        fill: none;
        stroke: #0b1020;
        stroke-width: 1.5;
        stroke-linejoin: round;
        opacity: .78;
        animation: core-inset-ignite 1.7s ease-out both;
      }
      .halo {
        opacity: .08;
        animation: halo-resolve 1.7s ease-out both;
      }
      .copy {
        opacity: 1;
        animation: copy-resolve 1.7s ease-out both;
      }
      .wordmark {
        fill: #f7f9fc;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 72px;
        font-weight: 720;
        letter-spacing: 5px;
      }
      .tagline {
        fill: #94a3b8;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 1.25px;
      }
      @keyframes module-assemble {
        0%, 14% {
          fill-opacity: 0;
          opacity: .46;
          stroke: #22d3ee;
          stroke-opacity: .82;
          transform: translateY(-11px) rotate(-8deg) scale(.96);
        }
        18% {
          fill-opacity: .14;
          opacity: .68;
        }
        55% {
          fill-opacity: 1;
          opacity: 1;
          stroke: #262d40;
          stroke-opacity: 1;
          transform: translateY(0) rotate(0) scale(1);
        }
        62% {
          transform: translateY(.6px) rotate(.8deg) scale(1.008);
        }
        69%, 100% {
          fill-opacity: 1;
          opacity: 1;
          stroke: #262d40;
          stroke-opacity: 1;
          transform: translateY(0) rotate(0) scale(1);
        }
      }
      @keyframes traces-connect {
        0%, 64% { opacity: 0; stroke-dashoffset: 10; }
        78%, 100% { opacity: .62; stroke-dashoffset: 0; }
      }
      @keyframes core-ignite {
        0%, 76% { opacity: 0; transform: scale(.72); filter: none; }
        84% { opacity: 1; transform: scale(1.08); filter: url(#core-glow); }
        92%, 100% { opacity: .72; transform: scale(1); filter: none; }
      }
      @keyframes core-inset-ignite {
        0%, 78% { opacity: 0; }
        90%, 100% { opacity: .78; }
      }
      @keyframes halo-resolve {
        0%, 72% { opacity: 0; }
        86% { opacity: .18; }
        100% { opacity: .08; }
      }
      @keyframes copy-resolve {
        0%, 90% { opacity: 0; transform: translateX(8px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .module, .traces, .core, .core-inset, .halo, .copy {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <rect width="900" height="300" rx="18" fill="url(#background)"/>
  <circle class="halo" cx="246" cy="150" r="110" fill="url(#core-halo)"/>

  <g transform="translate(150 54) scale(1.6)" mask="url(#negative-space)">
    <g>
      <g transform="rotate(0 60 60)"><use href="#module" class="module" style="--module-index:0"/></g>
      <g transform="rotate(60 60 60)"><use href="#module" class="module" style="--module-index:1"/></g>
      <g transform="rotate(120 60 60)"><use href="#module" class="module" style="--module-index:2"/></g>
      <g transform="rotate(180 60 60)"><use href="#module" class="module" style="--module-index:3"/></g>
      <g transform="rotate(240 60 60)"><use href="#module" class="module" style="--module-index:4"/></g>
      <g transform="rotate(300 60 60)"><use href="#module" class="module" style="--module-index:5"/></g>
    </g>

    <g class="traces">
      <use href="#trace" transform="rotate(0 60 60)"/>
      <use href="#trace" transform="rotate(60 60 60)"/>
      <use href="#trace" transform="rotate(120 60 60)"/>
      <use href="#trace" transform="rotate(180 60 60)"/>
      <use href="#trace" transform="rotate(240 60 60)"/>
      <use href="#trace" transform="rotate(300 60 60)"/>
    </g>

    <path class="core" d="M49 44H71L76 49V71L71 76H49L44 71V49L49 44Z"/>
    <path class="core-inset" d="M53 57V53H57M63 53H67V57M67 63V67H63M57 67H53V63"/>
  </g>

  <g class="copy">
    <text class="wordmark" x="390" y="137">FORGE</text>
    <text class="tagline" x="394" y="178">MANY SPECIALISTS. ONE COORDINATED SYSTEM.</text>
  </g>
</svg>
