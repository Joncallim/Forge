name: Agent Handoff

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to package for handoff
        required: true
        type: string

permissions:
  # Handoff writes run-log JSON and an issue comment. The generated prompt files
  # are uploaded as workflow artifacts, not committed.
  contents: write
  issues: write

concurrency:
  group: forge-agent-run-log-${{ github.repository }}
  cancel-in-progress: false

jobs:
  handoff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - id: handoff
        run: npm run forge:handoff
        env:
          FORGE_AGENT_RUN_LOG_BRANCH: forge/agent-run-log
          FORGE_AGENT_RUN_LOG_GIT_COMMIT: "1"
          GITHUB_BOT_LOGIN: github-actions[bot]
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}

      - uses: actions/upload-artifact@v7.0.1
        if: ${{ steps.handoff.outputs.artifact_directory != '' }}
        with:
          name: ${{ steps.handoff.outputs.artifact_name }}
          path: ${{ steps.handoff.outputs.artifact_directory }}
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
