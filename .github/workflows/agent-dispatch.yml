name: Agent Dispatch

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to dispatch
        required: true
        type: string
      dry_run:
        description: Validate and build the work order without writing labels, comments, or run-log updates
        required: false
        default: false
        type: boolean

permissions:
  # Dispatch is manual because labels applied by GITHUB_TOKEN do not trigger
  # follow-up workflow runs. It writes only issue comments/labels and durable run-log JSON.
  # It checks out trusted default-branch code and must never execute issue,
  # comment, pull request, or run-log branch code.
  contents: write
  issues: write

concurrency:
  group: forge-agent-run-log-${{ github.repository }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run forge:dispatch
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          FORGE_AGENT_RUN_LOG_BRANCH: forge/agent-run-log
          FORGE_AGENT_RUN_LOG_GIT_COMMIT: "1"
          GITHUB_BOT_LOGIN: github-actions[bot]
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
