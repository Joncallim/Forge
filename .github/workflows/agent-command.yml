name: Agent Command

on:
  issue_comment:
    types: [created]

permissions:
  # This issue_comment workflow has write access only for the durable run log.
  # It must keep checking out trusted default-branch code and must never execute
  # fork, pull request, or comment-supplied code while holding this token.
  contents: write
  issues: write

concurrency:
  group: forge-agent-command-run-log-${{ github.repository }}
  cancel-in-progress: false

jobs:
  route:
    if: >
      github.event.issue.pull_request == null &&
      (
        contains(github.event.comment.body, 'implement') ||
        contains(github.event.comment.body, 'Implement') ||
        contains(github.event.comment.body, 'review') ||
        contains(github.event.comment.body, 'Review') ||
        contains(github.event.comment.body, 'checkpoint') ||
        contains(github.event.comment.body, 'Checkpoint') ||
        contains(github.event.comment.body, 'handoff') ||
        contains(github.event.comment.body, 'Handoff')
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run forge:agent-command
        env:
          FORGE_AGENT_RUN_LOG_BRANCH: forge/agent-run-log
          FORGE_AGENT_RUN_LOG_GIT_COMMIT: "1"
          GITHUB_BOT_LOGIN: github-actions[bot]
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
