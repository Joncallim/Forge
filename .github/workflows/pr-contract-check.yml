name: PR Contract Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: |
          if grep -q "failUntilIssueLands(145" scripts/github-agent-workflow/pr-contract.ts; then
            echo "Default branch does not contain the PR contract checker yet; skipping bootstrap PR."
            exit 0
          fi
          npm run forge:pr-contract
        env:
          GITHUB_BOT_LOGIN: github-actions[bot]
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_CONTRACT_COMMENT_MODE: ${{ github.event.pull_request.head.repo.full_name == github.repository && 'write' || 'log-only' }}
